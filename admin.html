<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN CLASS — Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
  :root{
    --bg:#0b0b0f; --surface:#15151c; --surface2:#1d1d27; --border:#2a2a38;
    --text:#f2f2f7; --muted:#8a8a9a; --accent:#ccff00; --accent2:#ff3d71; --accent3:#00e0ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{max-width:960px;margin:0 auto;padding:24px 16px 80px;}
  h1{font-size:22px;font-weight:900;letter-spacing:2px;font-style:italic;margin-bottom:4px;}
  h1 span{color:var(--accent);}
  .sub{color:var(--muted);font-size:13px;margin-bottom:22px;}
  .tabs{display:flex;gap:8px;margin-bottom:20px;}
  .tabbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:800;cursor:pointer;}
  .tabbtn.on{background:var(--accent);color:#0b0b0f;border-color:var(--accent);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
  .btn{background:var(--accent);color:#0b0b0f;border:none;border-radius:10px;padding:11px 18px;font-size:13.5px;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;}
  .btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn.danger{background:var(--accent2);color:#fff;}
  .btn.small{padding:7px 12px;font-size:12px;}
  input,select{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;outline:none;}
  input:focus{border-color:var(--accent);}
  label{display:block;font-size:10.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .field{margin-bottom:12px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .row .field{flex:1;min-width:120px;margin-bottom:0;}
  .muted{color:var(--muted);font-size:12.5px;}
  .mhead{display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;}
  .mhead .nm{font-size:16px;font-weight:900;}
  .mhead .stats{color:var(--muted);font-size:12.5px;}
  .mbody{display:none;border-top:1px solid var(--border);margin-top:14px;padding-top:14px;}
  .mbody.open{display:block;}
  .sect{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;}
  .wlog{border-bottom:1px solid var(--border);padding:9px 0;font-size:13.5px;}
  .wlog:last-child{border-bottom:none;}
  .wlog small{color:var(--muted);display:block;font-size:11.5px;}
  .wlog .sets{color:var(--accent3);font-size:12px;margin-top:3px;line-height:1.6;}
  .pill{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:3px 10px;font-size:11.5px;color:var(--muted);margin:2px 4px 2px 0;}
  .pill b{color:var(--text);}
  /* program builder */
  .pday{border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;}
  .pday-h{background:var(--surface2);padding:12px 14px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .pday-h .field{margin-bottom:0;}
  .pday-b{padding:10px 14px 14px;}
  .exline{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .exline input.nm{flex:3;min-width:160px;}
  .exline input.tg{flex:1.2;min-width:80px;}
  .exline input.rs{flex:1;min-width:70px;}
  .exline .bigck{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--muted);font-weight:800;white-space:nowrap;}
  .icobtn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:8px;width:30px;height:34px;cursor:pointer;font-size:13px;flex-shrink:0;}
  .icobtn:hover{color:var(--text);}
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(--accent);color:#0b0b0f;font-weight:800;font-size:13.5px;padding:11px 22px;border-radius:24px;transition:transform .3s;z-index:99;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .login{max-width:380px;margin:14vh auto 0;}
  #app{display:none;}
</style>
</head>
<body>
<div class="wrap">

  <!-- login -->
  <div class="login" id="login">
    <h1>SPIN<span>CLASS</span> <span style="font-style:normal;color:var(--muted);font-size:14px;">/ ADMIN</span></h1>
    <div class="sub">Coach's office. Members never see this page.</div>
    <div class="card">
      <div class="field"><label>Admin key</label><input id="key" type="password" style="width:100%;" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn" onclick="doLogin()">Enter</button>
      <div class="muted" id="loginmsg" style="margin-top:10px;"></div>
    </div>
  </div>

  <!-- app -->
  <div id="app">
    <h1>SPIN<span>CLASS</span> <span style="font-style:normal;color:var(--muted);font-size:14px;">/ ADMIN</span></h1>
    <div class="sub">Full control. With great power, etc.</div>
    <div class="tabs">
      <button class="tabbtn on" id="tb-members" onclick="showTab('members')">Members</button>
      <button class="tabbtn" id="tb-program" onclick="showTab('program')">Program Builder</button>
    </div>

    <div id="tab-members">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="muted" id="mcount">Loading members…</div>
        <button class="btn ghost small" onclick="loadMembers()">↻ Refresh</button>
      </div>
      <div id="members"></div>
    </div>

    <div id="tab-program" style="display:none;">
      <div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
        <div>
          <b>Master Program</b>
          <div class="muted" id="progstatus">Loading…</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn ghost small" onclick="loadDefaultProgram()">Reset to PPL Default</button>
          <button class="btn small" onclick="pushProgram()">🚀 Push to App</button>
        </div>
      </div>
      <div id="builder"></div>
    </div>
  </div>

  <div class="toast" id="toast">Saved</div>
</div>

<datalist id="exdl"></datalist>

const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
const KEY=()=>sessionStorage.getItem('scAdminKey')||'';

async function api(path,opts={}){
  opts.headers=Object.assign({'content-type':'application/json','x-admin-key':KEY()},opts.headers||{});
  const r=await fetch(path,opts);
  if(r.status===401){ sessionStorage.removeItem('scAdminKey'); location.reload(); throw new Error('unauthorized'); }
  return r;
}

/* ---------- login ---------- */
async function doLogin(){
  const k=$('key').value.trim();
  if(!k) return;
  sessionStorage.setItem('scAdminKey',k);
  $('loginmsg').textContent='Checking…';
  const r=await fetch('/api/users',{headers:{'x-admin-key':k}});
  if(r.status===401){ $('loginmsg').textContent='Wrong key.'; sessionStorage.removeItem('scAdminKey'); return; }
  boot();
}
function boot(){
  $('login').style.display='none';
  $('app').style.display='block';
  // populate datalist once
  $('exdl').innerHTML = EXDB.map(e=>`<option value="${esc(e[0])}">${esc(e[2])} · ${esc(e[1])}</option>`).join('');
  loadMembers(); loadProgram();
}

/* ---------- members ---------- */
let MEMBERS=[];
async function loadMembers(){
  $('mcount').textContent='Loading members…';
  try{
    const r=await api('/api/users');
    const data=await r.json();
    MEMBERS=data.users||[];
    renderMembers();
  }catch(e){ $('mcount').textContent='Failed to load: '+e; }
}
function fmtDate(ts){ return ts? new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '—'; }
function renderMembers(){
  $('mcount').textContent = MEMBERS.length+' member'+(MEMBERS.length===1?'':'s');
  $('members').innerHTML = MEMBERS.length ? MEMBERS.map((m,i)=>{
    const s=m.state||{}; const p=s.profile||{};
    const w=(s.weights&&s.weights.length)?s.weights[s.weights.length-1]:null;
    const wos=(s.workouts||[]);
    return `<div class="card">
      <div class="mhead" onclick="document.getElementById('mb-${i}').classList.toggle('open')">
        <div>
          <div class="nm">${esc(p.name||'(no name)')}</div>
          <div class="stats">Last active ${fmtDate(m.updated)} · ${wos.length} workouts · streak ${s.streak||0}${w?' · '+w+' lbs':''}</div>
        </div>
        <div class="muted">▼</div>
      </div>
      <div class="mbody" id="mb-${i}">
        <div class="sect">Profile (admin edit)</div>
        <div class="row">
          <div class="field"><label>Name</label><input id="pn-${i}" value="${esc(p.name||'')}"></div>
          <div class="field"><label>Cal target</label><input id="pc-${i}" type="number" value="${p.calTarget||2400}"></div>
          <div class="field"><label>Protein target</label><input id="pp-${i}" type="number" value="${p.proTarget||180}"></div>
          <div class="field"><label>Goal wt</label><input id="pg-${i}" type="number" step="0.1" value="${p.goalWeight||''}"></div>
          <div class="field"><label>Streak</label><input id="ps-${i}" type="number" value="${s.streak||0}"></div>
          <button class="btn small" onclick="saveMember(${i})">Save</button>
          <button class="btn danger small" onclick="delMember(${i})">Delete</button>
        </div>
        <div class="sect">Workout Log (${wos.length})</div>
        ${wos.slice(0,15).map(wo=>`
          <div class="wlog"><b>${esc(wo.type)}</b> — ${wo.dur} min${wo.vol?' · '+wo.setsDone+' sets · '+wo.vol.toLocaleString()+' lb':''}
            <small>${esc(wo.when||'')}</small>
            ${wo.detail?`<div class="sets">${wo.detail.map(d=>esc(d.name)+': '+d.sets.map(x=>x.w+'×'+x.r).join(', ')).join('<br>')}</div>`:''}
          </div>`).join('') || '<div class="muted">Nothing logged yet.</div>'}
        <div class="sect">Weights</div>
        ${(s.weights||[]).slice(-10).map(x=>`<span class="pill"><b>${x}</b> lbs</span>`).join('')||'<span class="muted">None.</span>'}
        <div class="sect">Recent Meals</div>
        ${(s.meals||[]).slice(-10).reverse().map(x=>`<span class="pill"><b>${esc(x.name)}</b> ${x.cal} kcal · ${x.pro}g${x.date?' · '+x.date:''}</span>`).join('')||'<span class="muted">None.</span>'}
        <div class="sect">Stack</div>
        ${(s.stack||[]).map(x=>`<span class="pill"><b>${esc(x.name)}</b> ${esc(x.dose)}</span>`).join('')||'<span class="muted">Empty.</span>'}
        <div class="muted" style="margin-top:12px;">Device ID: ${m.id}</div>
      </div>
    </div>`;
  }).join('') : '<div class="card muted">No members yet — data appears here after someone uses the app (next version of the app syncs automatically).</div>';
}
async function saveMember(i){
  const m=MEMBERS[i]; const s=m.state;
  s.profile=s.profile||{};
  s.profile.name=$('pn-'+i).value.trim()||s.profile.name;
  s.profile.calTarget=+$('pc-'+i).value||2400;
  s.profile.proTarget=+$('pp-'+i).value||180;
  s.profile.goalWeight=+$('pg-'+i).value||null;
  s.streak=+$('ps-'+i).value||0;
  s.updatedAt=Date.now();
  await api('/api/admin-user',{method:'PUT',body:JSON.stringify({id:m.id,state:s})});
  toast((s.profile.name||'Member')+' updated ✓');
  loadMembers();
}
async function delMember(i){
  const m=MEMBERS[i];
  if(!confirm('Delete '+((m.state.profile||{}).name||m.id)+' from the server? Their device copy stays, but syncing starts fresh.')) return;
  await api('/api/admin-user?id='+m.id,{method:'DELETE'});
  toast('Member removed');
  loadMembers();
}

/* ---------- program builder ---------- */
let PB=null;
function showTab(t){
  $('tab-members').style.display = t==='members'?'block':'none';
  $('tab-program').style.display = t==='program'?'block':'none';
  $('tb-members').classList.toggle('on',t==='members');
  $('tb-program').classList.toggle('on',t==='program');
}
async function loadProgram(){
  try{
    const r=await fetch('/api/program');
    if(r.ok){ const d=await r.json(); PB=d.days; $('progstatus').textContent='Custom program live (pushed '+fmtDate(d.pushed)+')'; }
    else { PB=JSON.parse(JSON.stringify(DEFPROG)); $('progstatus').textContent='App is running the built-in PPL default'; }
  }catch(e){ PB=JSON.parse(JSON.stringify(DEFPROG)); $('progstatus').textContent='Offline — editing default'; }
  renderBuilder();
}
function loadDefaultProgram(){ PB=JSON.parse(JSON.stringify(DEFPROG)); renderBuilder(); toast('Loaded PPL default into editor'); }
function renderBuilder(){
  $('builder').innerHTML = PB.map((d,di)=>`
    <div class="pday">
      <div class="pday-h">
        <div style="font-weight:900;font-size:15px;align-self:center;">Day ${di+1}</div>
        <div class="field"><label>Session name</label><input value="${esc(d.name)}" onchange="PB[${di}].name=this.value"></div>
        <div class="field" style="flex:2;"><label>Subtitle</label><input value="${esc(d.sub)}" onchange="PB[${di}].sub=this.value"></div>
        <div class="field"><label>Big lift (or blank)</label><input value="${esc(d.big||'')}" onchange="PB[${di}].big=this.value||null"></div>
      </div>
      <div class="pday-b">
        ${d.ex.map((e,ei)=>`
          <div class="exline">
            <input class="nm" list="exdl" value="${esc(e[0])}" onchange="PB[${di}].ex[${ei}][0]=this.value">
            <input class="tg" value="${esc(e[1])}" placeholder="3 × 8–10" onchange="PB[${di}].ex[${ei}][1]=this.value">
            <input class="rs" value="${esc(e[2])}" placeholder="90 s" onchange="PB[${di}].ex[${ei}][2]=this.value">
            <div class="bigck"><input type="checkbox" ${e[3]?'checked':''} onchange="PB[${di}].ex[${ei}][3]=this.checked?1:0"> HEAVY</div>
            <button class="icobtn" onclick="moveEx(${di},${ei},-1)">↑</button>
            <button class="icobtn" onclick="moveEx(${di},${ei},1)">↓</button>
            <button class="icobtn" onclick="PB[${di}].ex.splice(${ei},1);renderBuilder()">✕</button>
          </div>`).join('')}
        <div class="exline">
          <input class="nm" list="exdl" id="add-${di}" placeholder="Add exercise — type to search the ${EXDB.length}-exercise library, or enter anything custom">
          <button class="btn ghost small" onclick="addEx(${di})">+ Add</button>
        </div>
      </div>
    </div>`).join('');
}
function moveEx(di,ei,dir){
  const arr=PB[di].ex; const j=ei+dir;
  if(j<0||j>=arr.length) return;
  [arr[ei],arr[j]]=[arr[j],arr[ei]];
  renderBuilder();
}
function addEx(di){
  const v=$('add-'+di).value.trim();
  if(!v) return;
  PB[di].ex.push([v,'3 × 8–12','90 s']);
  renderBuilder();
}
async function pushProgram(){
  for(const d of PB){ if(!d.name.trim()) return toast('Every day needs a name'); }
  if(!confirm('Push this program to everyone? Members get it next time they open the app.')) return;
  const r=await api('/api/program',{method:'PUT',body:JSON.stringify({days:PB})});
  const d=await r.json();
  if(d.ok){ toast('Program pushed to the app 🚀'); $('progstatus').textContent='Custom program live (pushed just now)'; }
  else toast('Push failed: '+(d.error||'unknown'));
}

/* ---------- boot ---------- */
if(KEY()){ fetch('/api/users',{headers:{'x-admin-key':KEY()}}).then(r=>{ if(r.ok) boot(); else sessionStorage.removeItem('scAdminKey'); }); }
</script>
