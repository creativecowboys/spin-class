<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN CLASS — Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
  :root{
    --bg:#0b0b0f; --surface:#15151c; --surface2:#1d1d27; --border:#2a2a38;
    --text:#f2f2f7; --muted:#8a8a9a; --accent:#ccff00; --accent2:#ff3d71; --accent3:#00e0ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{max-width:960px;margin:0 auto;padding:24px 16px 80px;}
  h1{font-size:22px;font-weight:900;letter-spacing:2px;font-style:italic;margin-bottom:4px;}
  h1 span{color:var(--accent);}
  .sub{color:var(--muted);font-size:13px;margin-bottom:22px;}
  .tabs{display:flex;gap:8px;margin-bottom:20px;}
  .tabbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:800;cursor:pointer;}
  .tabbtn.on{background:var(--accent);color:#0b0b0f;border-color:var(--accent);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
  .btn{background:var(--accent);color:#0b0b0f;border:none;border-radius:10px;padding:11px 18px;font-size:13.5px;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;}
  .btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn.danger{background:var(--accent2);color:#fff;}
  .btn.small{padding:7px 12px;font-size:12px;}
  input,select{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;outline:none;}
  input:focus{border-color:var(--accent);}
  label{display:block;font-size:10.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .field{margin-bottom:12px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .row .field{flex:1;min-width:120px;margin-bottom:0;}
  .muted{color:var(--muted);font-size:12.5px;}
  .mhead{display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;}
  .mhead .nm{font-size:16px;font-weight:900;}
  .mhead .stats{color:var(--muted);font-size:12.5px;}
  .mbody{display:none;border-top:1px solid var(--border);margin-top:14px;padding-top:14px;}
  .mbody.open{display:block;}
  .sect{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;}
  .wlog{border-bottom:1px solid var(--border);padding:9px 0;font-size:13.5px;}
  .wlog:last-child{border-bottom:none;}
  .wlog small{color:var(--muted);display:block;font-size:11.5px;}
  .wlog .sets{color:var(--accent3);font-size:12px;margin-top:3px;line-height:1.6;}
  .pill{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:3px 10px;font-size:11.5px;color:var(--muted);margin:2px 4px 2px 0;}
  .pill b{color:var(--text);}
  /* program builder */
  .pday{border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;}
  .pday-h{background:var(--surface2);padding:12px 14px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .pday-h .field{margin-bottom:0;}
  .pday-b{padding:10px 14px 14px;}
  /* collapsible library card */
  .wcard{border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;background:var(--surface);}
  .wcard.open{border-color:var(--accent);}
  .wcard-h{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;user-select:none;}
  .wcard-h:hover{background:var(--surface2);}
  .wcard-num{width:26px;height:26px;flex-shrink:0;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;}
  .wcard.open .wcard-num{background:var(--accent);color:#0b0b0f;border-color:var(--accent);}
  .wcard-t{flex:1;min-width:0;}
  .wcard-t b{font-size:15px;font-weight:900;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wcard-t small{color:var(--muted);font-size:12px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .wcard-acts{display:flex;gap:6px;flex-shrink:0;align-items:center;}
  .wcard-chev{color:var(--muted);font-size:12px;transition:transform .18s;flex-shrink:0;}
  .wcard.open .wcard-chev{transform:rotate(90deg);color:var(--accent);}
  .wcard-b{display:none;padding:4px 14px 14px;border-top:1px solid var(--border);}
  .wcard.open .wcard-b{display:block;}
  .wcard-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin:12px 0 6px;}
  .wcard-meta .field{margin-bottom:0;flex:1;min-width:120px;}
  .exmodal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-end;justify-content:center;z-index:100;}
  .exmodal.open{display:flex;}
  .exmodalcard{background:var(--surface);border:1px solid var(--border);border-radius:18px 18px 0 0;width:100%;max-width:640px;max-height:86vh;display:flex;flex-direction:column;padding:16px 16px calc(16px + env(safe-area-inset-bottom));}
  @media(min-width:641px){.exmodal{align-items:center;} .exmodalcard{border-radius:18px;max-height:80vh;}}
  .exmodalhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;}
  .exmodalhead b{font-size:16px;font-weight:900;}
  #ex-search{width:100%;margin-bottom:10px;}
  .exchips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:4px;flex-wrap:nowrap;}
  .exchip{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:14px;padding:6px 12px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}
  .exchip.on{background:var(--accent);color:#0b0b0f;border-color:var(--accent);}
  .exlist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .exrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 4px;border-bottom:1px solid var(--border);cursor:pointer;}
  .exrow:hover{background:var(--surface2);}
  .exrow b{font-size:14px;}
  .exrow small{color:var(--muted);font-size:11.5px;display:block;}
  .exrow .add{color:var(--accent);font-weight:900;font-size:20px;flex-shrink:0;}
  .exline{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .exline input.nm{flex:3;min-width:160px;}
  .exline input.tg{flex:1.2;min-width:80px;}
  .exline input.rs{flex:1;min-width:70px;}
  .exline .bigck{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--muted);font-weight:800;white-space:nowrap;}
  .icobtn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:8px;width:30px;height:34px;cursor:pointer;font-size:13px;flex-shrink:0;}
  .icobtn:hover{color:var(--text);}
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(--accent);color:#0b0b0f;font-weight:800;font-size:13.5px;padding:11px 22px;border-radius:24px;transition:transform .3s;z-index:99;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .login{max-width:380px;margin:14vh auto 0;}
  #app{display:none;}
  /* schedule assign */
  .schedgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
  .schedday .sd-l{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:4px;}
  .schedday select{width:100%;font-size:13px;}
  .schedday.today .sd-l{color:var(--accent);}  /* groups */
  .group-header{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);padding:12px 0 4px;margin-top:4px;}
  .group-badge{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;font-size:11px;font-weight:700;color:var(--muted);margin-left:8px;vertical-align:middle;}

</style>
</head>
<body>
<div class="wrap">

  <!-- login -->
  <div class="login" id="login">
    <h1>SPIN<span>CLASS</span> <span style="font-style:normal;color:var(--muted);font-size:14px;">/ ADMIN</span></h1>
    <div class="sub">Coach's office. Members never see this page.</div>
    <div class="card">
      <div class="field"><label>Admin key</label><input id="key" type="password" style="width:100%;" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn" onclick="doLogin()">Enter</button>
      <div class="muted" id="loginmsg" style="margin-top:10px;"></div>
    </div>
  </div>

  <!-- app -->
  <div id="app">
    <h1>SPIN<span>CLASS</span> <span style="font-style:normal;color:var(--muted);font-size:14px;">/ ADMIN</span></h1>
    <div class="sub">Full control. With great power, etc.</div>
    <div class="tabs">
      <button class="tabbtn on" id="tb-members" onclick="showTab('members')">Members</button>
      <button class="tabbtn" id="tb-program" onclick="showTab('program')">Program Builder</button>
    </div>

    <div id="tab-members">
      <div class="card" id="teamsched"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 12px;">
        <div class="muted" id="mcount">Loading members…</div>
        <button class="btn ghost small" onclick="loadMembers()">↻ Refresh</button>
      </div>
      <div id="members"></div>
    </div>

    <div id="tab-program" style="display:none;">
      <div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
        <div>
          <b>Workout Library</b>
          <div class="muted" id="progstatus">Loading…</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn ghost small" onclick="loadDefaultProgram()">Reset to PPL Default</button>
          <button class="btn small" onclick="pushProgram()">🚀 Push to App</button>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin:4px 2px 12px;">
        <div class="muted" id="libcount"></div>
        <button class="btn small" onclick="newWorkout()">+ New Workout</button>
      </div>
      <div id="builder"></div>
    </div>
  </div>

  <div class="toast" id="toast">Saved</div>
</div>

<div class="exmodal" id="exmodal" onclick="if(event.target===this)closeExPicker()">
  <div class="exmodalcard">
    <div class="exmodalhead"><b id="exmodal-title">Add from Library</b><button class="btn small" onclick="closeExPicker()">Done</button></div>
    <input id="ex-search" placeholder="Search exercises…" oninput="exSearch=this.value;renderExList()">
    <div class="exchips" id="ex-chips"></div>
    <div class="exlist" id="ex-list"></div>
  </div>
</div>

<datalist id="exdl"></datalist>
<datalist id="grp-list"><option value="Ryze Guys"><option value="Dixon's"></datalist>

async function api(path,opts={}){
  opts.headers=Object.assign({'content-type':'application/json','x-admin-key':KEY()},opts.headers||{});

  if(r.status===401){ sessionStorage.removeItem('scAdminKey'); location.reload(); throw new Error('unauthorized'); }
  return r;
}

/* ---------- members ---------- */
let MEMBERS=[];
let openM = new Set();
let awOff = 0;
function toggleM(i){ openM.has(i) ? openM.delete(i) : openM.add(i); document.getElementById('mb-'+i).classList.toggle('open'); }
function awDates(off){
  const now=new Date(); const mon=new Date(now);
  mon.setDate(now.getDate() - ((now.getDay()+6)%7) + off*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function isoOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function progNow(){ return (PB && PB.length===7) ? PB : DEFPROG; }

/* ---------- team schedule: assign a week of workouts to EVERYONE ---------- */
let TEAMSCHED = {};
function renderTeamSched(){
  const el=$('teamsched'); if(!el) return;
  const days=awDates(awOff), PROG=progNow(), t=isoOf(new Date());
  const label=days[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+days[6].toLocaleDateString('en-US',{month:'short',day:'numeric'});
  el.innerHTML = `
    <div class="sect" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">📅 Team Schedule — push workouts to everyone's calendar
      <button class="btn ghost small" onclick="awOff--;renderTeamSched();renderMembers()">‹</button>
      <span class="muted">${label}</span>
      <button class="btn ghost small" onclick="awOff++;renderTeamSched();renderMembers()">›</button></div>
    <div class="schedgrid">${days.map(d=>{
      const iso=isoOf(d), cur=TEAMSCHED[iso];
      return `<div class="schedday${iso===t?' today':''}">
        <div class="sd-l">${d.toLocaleDateString('en-US',{weekday:'short'})} ${d.getDate()}${iso===t?' · TODAY':''}</div>
        <select onchange="setTeamSched('${iso}',this.value)">
          <option value="">— rest / none —</option>
          ${PROG.map((p,pi)=>`<option value="${pi}" ${cur===pi?'selected':''}>Day ${pi+1} — ${esc(p.name)}</option>`).join('')}
        </select></div>`;
    }).join('')}</div>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
      <button class="btn ghost small" onclick="fillTeamSched()">⚡ Fill Mon–Sun (Day 1→)</button>
      <button class="btn ghost small" onclick="clearTeamSched()">Clear</button>
      <button class="btn small" onclick="pushTeamSchedule()">🚀 Push to Everyone (${MEMBERS.length})</button>
    </div>
    <p class="muted" style="margin-top:8px;font-size:12px;">Sets these workouts on every member's week — they see them as "today's workout" next time they open the app. Days left as "rest" are left as each member had them.</p>`;
}
function setTeamSched(iso,v){ if(v==='') delete TEAMSCHED[iso]; else TEAMSCHED[iso]=+v; }
function fillTeamSched(){ const n=progNow().length; awDates(awOff).forEach((d,idx)=>{ if(idx<n) TEAMSCHED[isoOf(d)]=idx; }); renderTeamSched(); }
function clearTeamSched(){ TEAMSCHED={}; renderTeamSched(); }
async function pushTeamSchedule(){
  if(!MEMBERS.length) return toast('No members yet');
  const set=Object.keys(TEAMSCHED);
  if(!set.length) return toast('Assign at least one day first');
  if(!confirm('Push this week\'s workouts to all '+MEMBERS.length+' members?')) return;
  let ok=0;
  for(const m of MEMBERS){
    try{
      // pull each member's freshest state so we don't clobber their recent activity
      const sr=await fetch('/api/sync?id='+m.id).then(r=>r.ok?r.json():null).catch(()=>null);
      const state=(sr&&sr.state)?sr.state:m.state;
      state.schedule=state.schedule||{};
      set.forEach(iso=>{ state.schedule[iso]=TEAMSCHED[iso]; });
      state.updatedAt=Date.now();
      await api('/api/admin-user',{method:'PUT',body:JSON.stringify({id:m.id,state})});
      ok++;
    }catch(e){}
  }
  toast('Pushed to '+ok+'/'+MEMBERS.length+' members 🚀');
  loadMembers();
}
function schedHtml(i){
  const m=MEMBERS[i]; const sch=(m.state&&m.state.schedule)||{};
  const days=awDates(awOff); const PROG=progNow();
  const t=isoOf(new Date());
  const label=days[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+days[6].toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `<div class="sect" style="display:flex;align-items:center;gap:8px;">Assign Workouts — ${label}
      <button class="btn ghost small" onclick="awOff--;renderMembers()">‹</button>
      <button class="btn ghost small" onclick="awOff++;renderMembers()">›</button></div>
    <div class="schedgrid">${days.map(d=>{
      const iso=isoOf(d); const cur=sch[iso];
      return `<div class="schedday${iso===t?' today':''}">
        <div class="sd-l">${d.toLocaleDateString('en-US',{weekday:'short'})} ${d.getDate()}${iso===t?' · TODAY':''}</div>
        <select onchange="setSched(${i},'${iso}',this.value)">
          <option value="">— rest / none —</option>
          ${PROG.map((p,pi)=>`<option value="${pi}" ${cur===pi?'selected':''}>Day ${pi+1} — ${esc(p.name)}</option>`).join('')}
        </select></div>`;
    }).join('')}</div>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
      <button class="btn ghost small" onclick="fillSched(${i})">⚡ Fill Mon–Sun (Day 1→)</button>
      <button class="btn small" onclick="saveSched(${i})">🚀 Push Schedule to ${esc(((m.state||{}).profile||{}).name||'member')}</button>
    </div>`;
}
function setSched(i, iso, v){
  const s=MEMBERS[i].state; s.schedule=s.schedule||{};
  if(v==='') delete s.schedule[iso]; else s.schedule[iso]=+v;
}
function fillSched(i){
  const s=MEMBERS[i].state; s.schedule=s.schedule||{}; const n=progNow().length;
  awDates(awOff).forEach((d,idx)=>{ if(idx<n) s.schedule[isoOf(d)]=idx; });
  renderMembers();
}
async function saveSched(i){
  const m=MEMBERS[i];
  m.state.updatedAt=Date.now();
  m.state._adminSchedulePushedAt=now;
  await api('/api/admin-user',{method:'PUT',body:JSON.stringify({id:m.id,state:m.state})});
  toast('Schedule pushed to '+(((m.state.profile||{}).name)||'member')+' 🚀 (they get it on next app open)');
}
async function loadMembers(){
  $('mcount').textContent='Loading members…';
  try{
    const r=await api('/api/users');
    const data=await r.json();
    MEMBERS=data.users||[];
    renderMembers();
  }catch(e){ $('mcount').textContent='Failed to load: '+e; }
}
function fmtDate(ts){ return ts? new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '—'; }

    $('members').innerHTML='<div class="card muted">No members yet — data appears here after someone uses the app.</div>';

    html+=`<div class="card">
      <div class="mhead" onclick="toggleM(${i})">
        <div>
          <div class="nm">${esc(p.name||'(no name)')}${grp?`<span class="group-badge">${esc(grp)}</span>`:''}  </div>

        <div class="muted">▼</div>

          <div class="field"><label>Cal target</label><input id="pc-${i}" type="number" value="${p.calTarget||2400}"></div>
          <div class="field"><label>Protein target</label><input id="pp-${i}" type="number" value="${p.proTarget||180}"></div>

        </div>
        ${schedHtml(i)}

          <div class="wlog"><b>${esc(wo.type)}</b> — ${wo.dur} min${wo.vol?' · '+wo.setsDone+' sets · '+wo.vol.toLocaleString()+' lb':''}

        ${(s.weights||[]).slice(-10).map(x=>{const v=typeof x==='number'?x:x.w; const d=(x&&x.at)?' · '+new Date(x.at).toLocaleDateString('en-US',{month:'short',day:'numeric'}):''; return `<span class="pill"><b>${v}</b> lbs${d}</span>`;}).join('')||'<span class="muted">None.</span>'}
        <div class="sect">Recent Meals</div>
        ${(s.meals||[]).slice(-10).reverse().map(x=>`<span class="pill"><b>${esc(x.name)}</b> ${x.cal} kcal · ${x.pro}P · ${x.carb||0}C · ${x.fat||0}F${x.date?' · '+x.date:''}</span>`).join('')||'<span class="muted">None.</span>'}

  }

async function saveMember(i){
  const m=MEMBERS[i]; const s=m.state;
  s.profile=s.profile||{};
  s.profile.name=$('pn-'+i).value.trim()||s.profile.name;
  s.profile.group=$('pgr-'+i).value.trim();
  s.profile.calTarget=+$('pc-'+i).value||2400;
  s.profile.proTarget=+$('pp-'+i).value||180;
  s.profile.goalWeight=+$('pg-'+i).value||null;
  s.profile.waterGoal=+$('pwg-'+i)||64;
  s.streak=+$('ps-'+i).value||0;
  s.pin=$('pw-'+i).value.replace(/\D/g,'').slice(0,4);
  s.updatedAt=Date.now();
  await api('/api/admin-user',{method:'PUT',body:JSON.stringify({id:m.id,state:s})});
  toast((s.profile.name||'Member')+' updated ✓');
  loadMembers();
}
async function delMember(i){
  const m=MEMBERS[i];
  if(!confirm('Delete '+((m.state.profile||{}).name||m.id)+' from the server? Their device copy stays, but syncing starts fresh.')) return;
  await api('/api/admin-user?id='+m.id,{method:'DELETE'});
  toast('Member removed');
  loadMembers();
}

/* ---------- program builder ---------- */
let PB=null;
function showTab(t){
  $('tab-members').style.display = t==='members'?'block':'none';
  $('tab-program').style.display = t==='program'?'block':'none';
  $('tb-members').classList.toggle('on',t==='members');
  $('tb-program').classList.toggle('on',t==='program');
}
async function loadProgram(){
  try{
    const r=await fetch('/api/program');
    if(r.ok){ const d=await r.json(); PB=d.days; $('progstatus').textContent='Custom program live (pushed '+fmtDate(d.pushed)+')'; }
    else { PB=JSON.parse(JSON.stringify(DEFPROG)); $('progstatus').textContent='App is running the built-in PPL default'; }
  }catch(e){ PB=JSON.parse(JSON.stringify(DEFPROG)); $('progstatus').textContent='Offline — editing default'; }
  renderBuilder();
}
function loadDefaultProgram(){ PB=JSON.parse(JSON.stringify(DEFPROG)); pbOpen=new WeakSet(); renderBuilder(); toast('Loaded PPL default into editor'); }
let pbOpen = new WeakSet(); // which workout cards are expanded (keyed by the object, survives add/delete)
function renderBuilder(){
  $('libcount').textContent = PB.length + ' workout' + (PB.length===1?'':'s') + ' in the library';
  $('builder').innerHTML = PB.map((d,di)=>{
    const open = pbOpen.has(d);
    const meta = [d.sub, (d.ex||[]).length + ' exercise' + ((d.ex||[]).length===1?'':'s')].filter(Boolean).join(' · ');
    return `
    <div class="wcard${open?' open':''}">
      <div class="wcard-h" onclick="toggleWorkout(${di})">
        <div class="wcard-num">${di+1}</div>
        <div class="wcard-t"><b>${esc(d.name||'Untitled workout')}</b><small>${esc(meta)}</small></div>
        <div class="wcard-acts">
          <button class="btn ghost small" onclick="event.stopPropagation();dupWorkout(${di})">Duplicate</button>
          <button class="icobtn" title="Delete workout" onclick="event.stopPropagation();delWorkout(${di})">🗑</button>
          <span class="wcard-chev">▶</span>
        </div>
      </div>
      <div class="wcard-b">
        <div class="wcard-meta">
          <div class="field"><label>Workout name</label><input value="${esc(d.name)}" onchange="PB[${di}].name=this.value;refreshCardHead(${di})"></div>
          <div class="field" style="flex:2;"><label>Subtitle</label><input value="${esc(d.sub||'')}" onchange="PB[${di}].sub=this.value;refreshCardHead(${di})"></div>
          <div class="field"><label>Big lift (or blank)</label><input value="${esc(d.big||'')}" onchange="PB[${di}].big=this.value||null"></div>
        </div>
        ${d.ex.map((e,ei)=>`
          <div class="exline">
            <input class="nm" list="exdl" value="${esc(e[0])}" onchange="PB[${di}].ex[${ei}][0]=this.value">
            <input class="tg" value="${esc(e[1])}" placeholder="3 × 8–10" onchange="PB[${di}].ex[${ei}][1]=this.value">
            <input class="rs" value="${esc(e[2])}" placeholder="90 s" onchange="PB[${di}].ex[${ei}][2]=this.value">
            <div class="bigck"><input type="checkbox" ${e[3]?'checked':''} onchange="PB[${di}].ex[${ei}][3]=this.checked?1:0"> HEAVY</div>
            <button class="icobtn" onclick="moveEx(${di},${ei},-1)">↑</button>
            <button class="icobtn" onclick="moveEx(${di},${ei},1)">↓</button>
            <button class="icobtn" onclick="PB[${di}].ex.splice(${ei},1);renderBuilder()">✕</button>
          </div>`).join('')}
        <div class="exline" style="margin-top:4px;">
          <button class="btn small" onclick="openExPicker(${di})">+ Add from Library</button>
          <input class="nm" list="exdl" id="add-${di}" placeholder="…or type a custom exercise">
          <button class="btn ghost small" onclick="addEx(${di})">Add</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function refreshCardHead(di){
  // update the collapsed header text live without re-rendering (keeps input focus)
  const d=PB[di]; if(!d) return;
  const card=$('builder').children[di]; if(!card) return;
  const t=card.querySelector('.wcard-t');
  if(t){ const meta=[d.sub,(d.ex||[]).length+' exercise'+((d.ex||[]).length===1?'':'s')].filter(Boolean).join(' · ');
    t.querySelector('b').textContent=d.name||'Untitled workout';
    t.querySelector('small').textContent=meta; }
}
function toggleWorkout(di){ const d=PB[di]; if(!d) return; if(pbOpen.has(d)) pbOpen.delete(d); else pbOpen.add(d); renderBuilder(); }
function newWorkout(){
  const w={name:'New Workout',sub:'',big:null,ex:[]};
  PB.push(w); pbOpen.add(w); renderBuilder();
  const el=$('builder').lastElementChild; if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  toast('Blank workout added — build it out');
}
function dupWorkout(di){
  const src=PB[di]; if(!src) return;
  const copy=JSON.parse(JSON.stringify(src));
  copy.name=(src.name||'Workout')+' copy';
  PB.push(copy); pbOpen.add(copy); renderBuilder(); // appended to the end so existing day numbers don't shift
  const el=$('builder').lastElementChild; if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  toast('Duplicated — edit the copy');
}
function delWorkout(di){
  const d=PB[di]; if(!d) return;
  if(PB.length<=1) return toast('Keep at least one workout');
  if(!confirm('Delete "'+(d.name||'this workout')+'"?\n\nHeads-up: this renumbers the workouts after it, so re-push any member schedules that used later day numbers.')) return;
  PB.splice(di,1); renderBuilder();
  toast('Workout deleted');
}
function moveEx(di,ei,dir){
  const arr=PB[di].ex; const j=ei+dir;
  if(j<0||j>=arr.length) return;
  [arr[ei],arr[j]]=[arr[j],arr[ei]];
  renderBuilder();
}
function addEx(di){
  const v=$('add-'+di).value.trim();
  if(!v) return;
  PB[di].ex.push([v,'3 × 8–12','90 s']);
  renderBuilder();
}
/* ---------- exercise library picker ---------- */
let exPickDay=null, exSearch='', exGroup='All';
function mGroup(m){
  if(/Chest/.test(m)) return 'Chest';
  if(/Lats|Back|Traps/.test(m)) return 'Back';
  if(/Delts/.test(m)) return 'Shoulders';
  if(/Biceps|Brachi/.test(m)) return 'Biceps';
  if(/Triceps/.test(m)) return 'Triceps';
  if(/Forearm|Grip/.test(m)) return 'Forearms';
  if(/Quads/.test(m)) return 'Quads';
  if(/Hamstring/.test(m)) return 'Hams';
  if(/Glute/.test(m)) return 'Glutes';
  if(/Calves/.test(m)) return 'Calves';
  if(/Abs|Core|Oblique/.test(m)) return 'Abs/Core';
  return 'Other';
}
function openExPicker(di){
  exPickDay=di; exSearch=''; exGroup='All';
  $('exmodal-title').textContent='Add to Day '+(di+1)+(PB[di].name?' — '+PB[di].name:'');
  $('ex-search').value='';
  renderExChips(); renderExList();
  $('exmodal').classList.add('open');
  setTimeout(()=>$('ex-search').focus(),100);
}
function closeExPicker(){ $('exmodal').classList.remove('open'); exPickDay=null; }
function renderExChips(){
  const groups=['All','Chest','Back','Shoulders','Biceps','Triceps','Forearms','Quads','Hams','Glutes','Calves','Abs/Core','Other'];
  $('ex-chips').innerHTML=groups.map(g=>`<div class="exchip${g===exGroup?' on':''}" onclick="exGroup='${g}';renderExChips();renderExList()">${g}</div>`).join('');
}
function renderExList(){
  const q=exSearch.trim().toLowerCase(); const rows=[];
  for(let i=0;i<EXDB.length;i++){
    const e=EXDB[i];
    if(exGroup!=='All' && mGroup(e[2])!==exGroup) continue;
    if(q && !(e[0].toLowerCase().includes(q)||e[2].toLowerCase().includes(q)||e[1].toLowerCase().includes(q))) continue;
    rows.push(`<div class="exrow" onclick="addExFromLib(${i})"><div><b>${esc(e[0])}</b><small>${esc(e[2])} · ${esc(e[1])}</small></div><div class="add">+</div></div>`);
    if(rows.length>=150) break;
  }
  $('ex-list').innerHTML=rows.join('')||'<div class="muted" style="padding:14px 4px;">No matches.</div>';
}
function addExFromLib(i){
  if(exPickDay==null) return;
  const e=EXDB[i];
  PB[exPickDay].ex.push([e[0],'3 × 8–12','90 s']);
  toast(e[0]+' added ✓');
  renderBuilder(); // modal stays open so you can add several
}
async function pushProgram(){
  if(!PB.length) return toast('Add at least one workout first');
  for(const d of PB){ if(!(d.name||'').trim()) return toast('Every workout needs a name'); }
  if(!confirm('Push this library of '+PB.length+' workout'+(PB.length===1?'':'s')+' to everyone? Members get it next time they open the app.')) return;
  const r=await api('/api/program',{method:'PUT',body:JSON.stringify({days:PB})});
  const d=await r.json();
  if(d.ok){ toast('Program pushed to the app 🚀'); $('progstatus').textContent='Custom program live (pushed just now)'; }
  else toast('Push failed: '+(d.error||'unknown'));
}

/* ---------- boot ---------- */
if(KEY()){ fetch('/api/users',{headers:{'x-admin-key':KEY()}}).then(r=>{ if(r.ok) boot(); else sessionStorage.removeItem('scAdminKey'); }); }
</script>
